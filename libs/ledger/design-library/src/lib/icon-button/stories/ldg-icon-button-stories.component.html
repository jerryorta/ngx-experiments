<nge-storybook-review-container
  [reviewStatus]="reviewStatus"
  [storybookFilePath]="storybookFilePath"
  trackingNumber="NGE-LDG"
>
  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    Interactive (controlled by Storybook args)
  </h4>
  <div class="mb-2 flex flex-row items-center gap-3">
    <ldg-icon-button
      [icon]="iconSig()"
      [ariaLabel]="ariaLabelSig()"
      [variant]="variantSig()"
      [disabled]="disabledSig()"
      (pressed)="onPressed('interactive')"
    />
  </div>
  <p class="mb-8 text-xs opacity-60">Last pressed: {{ lastPressed || '(none yet)' }}</p>

  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">Variants</h4>
  <div class="mb-8 flex flex-row items-center gap-3">
    <ldg-icon-button
      icon="delete"
      ariaLabel="Ghost variant"
      variant="ghost"
    />
    <ldg-icon-button
      icon="add"
      ariaLabel="Solid variant"
      variant="solid"
    />
  </div>

  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">States</h4>
  <div class="flex flex-row items-center gap-3">
    <ldg-icon-button
      icon="delete"
      ariaLabel="Disabled ghost"
      variant="ghost"
      [disabled]="true"
    />
    <ldg-icon-button
      icon="add"
      ariaLabel="Disabled solid"
      variant="solid"
      [disabled]="true"
    />
  </div>
</nge-storybook-review-container>
