<nge-storybook-review-container
  [reviewStatus]="reviewStatus"
  [storybookFilePath]="storybookFilePath"
  trackingNumber="NGE-LDG"
>
  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    Interactive (controlled by Storybook args)
  </h4>
  <div class="mb-8 w-80">
    <ldg-account-card
      [account]="account()"
      [selected]="selectedSig()"
    />
  </div>

  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    Account Types (incl. a negative credit balance)
  </h4>
  <div class="mb-8 grid w-full max-w-2xl grid-cols-1 gap-3 sm:grid-cols-2">
    @for (acc of accountTypes; track acc.id) {
      <ldg-account-card [account]="acc" />
    }
  </div>

  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    Picker (selected + pressed working together)
  </h4>
  <div class="grid w-full max-w-2xl grid-cols-1 gap-3 sm:grid-cols-2">
    @for (acc of accountTypes; track acc.id) {
      <ldg-account-card
        [account]="acc"
        [selected]="pickedId() === acc.id"
        (pressed)="onPicked($event)"
      />
    }
  </div>
  <p class="mt-4 text-sm opacity-70">
    Last pressed: <span class="font-medium">{{ lastPressed() }}</span>
  </p>
</nge-storybook-review-container>
