<svg
  class="tooltip-bubble"
  [attr.width]="chartTooltipState().svgWidth"
  [attr.height]="chartTooltipState().svgHeight"
  [attr.viewBox]="chartTooltipState().viewBox"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <path
    class="tooltip-bubble-path"
    [attr.d]="chartTooltipState().bubblePath"
    [style.fill]="chartTooltipState().backgroundColor"
    [style.stroke]="chartTooltipState().borderColor"
    [style.stroke-width.px]="chartTooltipState().borderWidth"
  />
</svg>
<div
  class="nge-charts-tooltip-content"
  [style.height.px]="chartTooltipState().bubbleHeight"
  [style.top.px]="chartTooltipState().divotPosition === 'top' ? chartTooltipState().divotHeight : 0"
>
  <ng-content />
</div>
