<div
  class="nge-chart-legend-list"
  [class.nge-chart-legend-list--vertical]="orientation() === 'vertical'"
  [class.nge-chart-legend-list--grid]="layout() === 'grid' && orientation() !== 'vertical'"
>
  @for (item of items(); track item.id ?? item.label) {
    @if (interactive()) {
      <button
        type="button"
        class="nge-chart-legend-item nge-chart-legend-item--interactive"
        [attr.aria-pressed]="item.selected ?? false"
        [style.opacity]="item.opacity"
        (click)="itemClick.emit(item)"
      >
        <span
          class="nge-chart-legend-swatch"
          [class.nge-chart-legend-swatch--circle]="swatchShape() === 'circle'"
          [class.nge-chart-legend-swatch--line]="swatchShape() === 'line'"
          [style.background-color]="item.color"
        ></span>
        <span class="nge-chart-legend-label">{{ item.label }}</span>
      </button>
    } @else {
      <div
        class="nge-chart-legend-item"
        [style.opacity]="item.opacity"
      >
        <span
          class="nge-chart-legend-swatch"
          [class.nge-chart-legend-swatch--circle]="swatchShape() === 'circle'"
          [class.nge-chart-legend-swatch--line]="swatchShape() === 'line'"
          [style.background-color]="item.color"
        ></span>
        <span class="nge-chart-legend-label">{{ item.label }}</span>
      </div>
    }
  }
</div>
