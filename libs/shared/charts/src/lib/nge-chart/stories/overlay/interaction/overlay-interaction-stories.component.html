<nge-storybook-review-container
  [reviewStatus]="reviewStatus"
  [storybookFilePath]="storybookFilePath"
>
  <div class="interaction-container">
    <div class="interaction-row">
      <button
        type="button"
        class="interaction-btn interaction-btn--primary"
        (click)="randomizeData()"
      >
        Randomize Data
      </button>
      <span class="interaction-hint">
        Mode: <strong>{{ mode() }}</strong> — the overlay composes on a line host and shares its
        scales. Trendline and fan need a continuous (numeric) x.
      </span>
    </div>
    @if (interactiveLegend()) {
      <!-- Standalone interactive legend above the chart: clicking a series toggles
           its line + trend in/out; a toggled-off series stays listed but dimmed
           (opacity 0.4) so it can be toggled back on. -->
      <div class="external-legend-row">
        <span class="external-legend-caption"
          >Standalone &lt;nge-chart-legend&gt; — click a series to toggle its line + trend
          on/off</span
        >
        <nge-chart-legend
          [items]="legendItems()"
          [interactive]="true"
          swatchShape="line"
          layout="grid"
          (itemClick)="onLegendItemClick($event)"
        />
      </div>
    }
    <div class="chart-wrapper">
      <nge-chart [config]="config()" />
    </div>
  </div>
</nge-storybook-review-container>
