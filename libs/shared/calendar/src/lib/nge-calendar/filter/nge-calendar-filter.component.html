@let open = isOpen();
@let count = store.activeFilterCount();

<!-- Funnel trigger — anchors the overlay; toggles open / closed -->
<button
  #trigger
  type="button"
  class="nge-calendar-filter__trigger"
  [class.nge-calendar-filter__trigger--active]="store.filterActive()"
  [class.nge-calendar-filter__trigger--open]="open"
  [attr.aria-expanded]="open"
  aria-haspopup="dialog"
  [attr.aria-label]="count > 0 ? 'Filter events, ' + count + ' active' : 'Filter events'"
  data-testid="nge-calendar-filter-trigger"
  (click)="toggle()"
>
  <svg
    class="nge-calendar-filter__icon"
    viewBox="0 0 16 16"
    width="16"
    height="16"
    aria-hidden="true"
    focusable="false"
  >
    <path
      fill="currentColor"
      d="M1.5 2.5h13a.5.5 0 0 1 .4.8L10 9.2V14a.5.5 0 0 1-.7.45l-3-1.5A.5.5 0 0 1 6 12.5V9.2L1.1 3.3a.5.5 0 0 1 .4-.8Z"
    />
  </svg>
  @if (count > 0) {
    <span
      class="nge-calendar-filter__badge"
      data-testid="nge-calendar-filter-badge"
      aria-hidden="true"
      >{{ count }}</span
    >
  }
</button>

<!-- CDK overlay panel — portalled into the body-mounted pane -->
<ng-template #panelTemplate>
  <div
    class="nge-calendar-filter__card"
    role="dialog"
    aria-label="Filter events"
    data-testid="nge-calendar-filter-panel"
    cdkTrapFocus
    [cdkTrapFocusAutoCapture]="true"
  >
    <div class="nge-calendar-filter__body">
      @if (hostPanel(); as tpl) {
        <ng-container *ngTemplateOutlet="tpl; context: panelContext" />
      } @else {
        <nge-calendar-default-filter
          [filter]="draft()"
          [availableColors]="store.availableColors()"
          (valueChange)="mergeDraft($event)"
        />
      }
    </div>

    <!-- Default footer (Clear / Done). A host panel owns its own actions via the
         context's `setFilter` / `apply` / `close`, so we hide the default footer. -->
    @if (!hostPanel()) {
      <div class="nge-calendar-filter__footer">
        <button
          type="button"
          class="nge-calendar-filter__btn nge-calendar-filter__btn--clear"
          data-testid="nge-calendar-filter-clear"
          (click)="clearDraft()"
          >Clear</button
        >
        <button
          type="button"
          class="nge-calendar-filter__btn nge-calendar-filter__btn--done"
          data-testid="nge-calendar-filter-done"
          (click)="applyDraft()"
          >Done</button
        >
      </div>
    }
  </div>
</ng-template>
