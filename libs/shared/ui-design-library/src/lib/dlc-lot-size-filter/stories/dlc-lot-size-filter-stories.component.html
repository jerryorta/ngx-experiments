<giga-storybook-review-container
  [reviewStatus]="reviewStatus"
  [storybookFilePath]="storybookFilePath"
  trackingNumber="REX-485"
>
  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    Default (Empty, Sq Ft)
  </h4>
  <div class="mb-8 max-w-md">
    <dlc-lot-size-filter />
  </div>

  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    Preselected Sq Ft (5,000 – 20,000)
  </h4>
  <div class="mb-8 max-w-md">
    <dlc-lot-size-filter
      [min]="5000"
      [max]="20000"
    />
  </div>

  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    Preselected Acres (0.25 – 1)
  </h4>
  <div class="mb-8 max-w-md">
    <dlc-lot-size-filter
      unit="acres"
      [min]="10890"
      [max]="43560"
    />
  </div>

  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    Interactive (Live Emissions)
  </h4>
  <div class="mb-8 max-w-md">
    <dlc-lot-size-filter
      [min]="interactiveMin()"
      [max]="interactiveMax()"
      [unit]="interactiveUnit()"
      (rangeChange)="onInteractiveRangeChange($event)"
      (unitChange)="onInteractiveUnitChange($event)"
    />
    <p class="mt-3 text-xs text-(--dlc-on-surface-variant)">
      Emitted rangeChange (canonical sqft) — min: {{ interactiveMin() ?? "null" }}, max:
      {{ interactiveMax() ?? "null" }} — unit: {{ interactiveUnit() }}
    </p>
  </div>
</giga-storybook-review-container>
