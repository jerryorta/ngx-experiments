<nge-storybook-review-container
  [reviewStatus]="reviewStatus"
  [storybookFilePath]="storybookFilePath"
  [uxUrl]="uxUrl"
  trackingNumber="REX-29"
>
  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60"> Positions </h4>
  <div
    class="mb-8 flex flex-row flex-wrap items-center justify-center gap-6"
    style="padding: 3rem 0"
  >
    <button
      class="rounded border px-4 py-2 text-sm"
      [dlcTooltip]="'Appears above'"
      dlcTooltipPosition="above"
    >
      Above
    </button>
    <button
      class="rounded border px-4 py-2 text-sm"
      [dlcTooltip]="'Appears below'"
      dlcTooltipPosition="below"
    >
      Below
    </button>
    <button
      class="rounded border px-4 py-2 text-sm"
      [dlcTooltip]="'Appears to the left'"
      dlcTooltipPosition="left"
    >
      Left
    </button>
    <button
      class="rounded border px-4 py-2 text-sm"
      [dlcTooltip]="'Appears to the right'"
      dlcTooltipPosition="right"
    >
      Right
    </button>
  </div>

  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    On Various Elements
  </h4>
  <div class="mb-8 flex flex-row flex-wrap items-center gap-4">
    <span
      class="cursor-help text-sm underline"
      [dlcTooltip]="'Tooltip on a span'"
    >
      Hover over text
    </span>
    <input
      class="rounded border px-3 py-2 text-sm"
      placeholder="Focus me for tooltip"
      [dlcTooltip]="'Tooltip on input focus'"
      dlcTooltipPosition="below"
    />
  </div>
</nge-storybook-review-container>
