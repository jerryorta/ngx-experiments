<giga-storybook-review-container
  [reviewStatus]="reviewStatus"
  [storybookFilePath]="storybookFilePath"
  trackingNumber="REX-489"
>
  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    Default (No Explicit Sort — "Newest")
  </h4>
  <div class="mb-8">
    <dlc-sort-control />
  </div>

  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    Preselected (Price Descending)
  </h4>
  <div class="mb-8">
    <dlc-sort-control
      field="price"
      direction="desc"
    />
  </div>

  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    Preselected (Year Built Ascending)
  </h4>
  <div class="mb-8">
    <dlc-sort-control
      field="year"
      direction="asc"
    />
  </div>

  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    Interactive (Live Emissions)
  </h4>
  <div class="mb-8">
    <dlc-sort-control
      [field]="interactiveField()"
      [direction]="interactiveDirection()"
      (sortChange)="onInteractiveSortChange($event)"
    />
    <p class="mt-3 text-xs text-(--dlc-on-surface-variant)">
      Emitted sortChange — field: {{ interactiveField() ?? "null" }}, direction:
      {{ interactiveDirection() }}
    </p>
  </div>
</giga-storybook-review-container>
