@let _min = min();
@let _max = max();
@let _sliderMaxValue = sliderMax();
@let _sliderStepValue = sliderStep();
@let _quickRangesList = quickRanges();

<div class="flex flex-col gap-4">
  <div class="flex flex-row gap-3">
    <dlc-input
      class="flex-1"
      type="number"
      label="Min"
      placeholder="Any"
      data-testid="sqft-min-input"
      [ngModel]="_min"
      (ngModelChange)="onMinInputChange($event)"
    />
    <dlc-input
      class="flex-1"
      type="number"
      label="Max"
      placeholder="Any"
      data-testid="sqft-max-input"
      [ngModel]="_max"
      (ngModelChange)="onMaxInputChange($event)"
    />
  </div>

  <div class="flex flex-col gap-2">
    <div class="relative h-5">
      <div
        class="absolute inset-x-0 top-1/2 h-1 -translate-y-1/2 rounded-full bg-(--dlc-surface-container-high)"
      ></div>
      <div
        class="absolute top-1/2 h-1 -translate-y-1/2 rounded-full bg-(--dlc-primary)"
        [style.left.%]="_fillLeftPct()"
        [style.width.%]="_fillWidthPct()"
      ></div>
      <input
        type="range"
        class="dlc-sqft-filter__range pointer-events-none absolute top-0 left-0 h-full w-full appearance-none bg-transparent"
        min="0"
        aria-label="Minimum square feet"
        data-testid="sqft-slider-min"
        [max]="_sliderMaxValue"
        [step]="_sliderStepValue"
        [value]="_minView()"
        (input)="onSliderMinChange($event)"
      />
      <input
        type="range"
        class="dlc-sqft-filter__range pointer-events-none absolute top-0 left-0 h-full w-full appearance-none bg-transparent"
        min="0"
        aria-label="Maximum square feet"
        data-testid="sqft-slider-max"
        [max]="_sliderMaxValue"
        [step]="_sliderStepValue"
        [value]="_maxView()"
        (input)="onSliderMaxChange($event)"
      />
    </div>
    <span
      class="text-xs text-(--dlc-on-surface-variant)"
      data-testid="sqft-range-readout"
    >
      {{ _formattedRange() }}
    </span>
  </div>

  <div class="flex flex-row flex-wrap gap-2">
    @for (preset of _quickRangesList; track preset.label; let presetIndex = $index) {
      <dlc-button
        size="sm"
        [variant]="isActivePreset(preset) ? 'primary' : 'ghost'"
        [attr.data-testid]="'sqft-preset-' + presetIndex"
        (click)="applyPreset(preset)"
      >
        {{ preset.label }}
      </dlc-button>
    }
  </div>
</div>
