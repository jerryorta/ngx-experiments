<nge-storybook-review-container
  [reviewStatus]="reviewStatus"
  [storybookFilePath]="storybookFilePath"
  trackingNumber="REX-487"
>
  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">Default (Empty)</h4>
  <div class="mb-8 max-w-md">
    <dlc-property-type-filter />
  </div>

  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    Preselected (Residential + Land)
  </h4>
  <div class="mb-8 max-w-md">
    <dlc-property-type-filter [selected]="['Residential', 'Land']" />
  </div>

  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    Interactive (Live Emissions)
  </h4>
  <div class="mb-8 max-w-md">
    <dlc-property-type-filter
      [selected]="interactiveSelection()"
      (selectedChange)="onInteractiveSelectionChange($event)"
    />
    <p class="mt-3 text-xs text-(--dlc-on-surface-variant)">
      Emitted selectedChange — [{{ interactiveSelection().join(", ") }}]
    </p>
  </div>
</nge-storybook-review-container>
