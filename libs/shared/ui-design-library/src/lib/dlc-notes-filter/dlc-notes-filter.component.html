@let _count = count();

<div
  class="dlc-notes-filter__body flex w-64 flex-col gap-2"
  role="group"
  aria-label="Notes filter"
>
  <dlc-checkbox
    class="dlc-notes-filter__option"
    data-testid="notes-toggle"
    ariaLabel="Has notes only"
    [checked]="enabled()"
    (checkedChange)="enabledChange.emit($event)"
  >
    <span class="flex min-w-0 items-center gap-2">
      <span class="dlc-notes-filter__label text-sm text-(--dlc-on-surface)">Has notes only</span>
      @if (_count !== null) {
        <dlc-badge
          variant="surface"
          data-testid="notes-count"
          [count]="_count"
        />
      }
    </span>
  </dlc-checkbox>
</div>
