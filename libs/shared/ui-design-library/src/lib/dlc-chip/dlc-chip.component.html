<ng-content />

@if (removable()) {
  <button
    type="button"
    class="-mr-1 ml-0.5 inline-flex shrink-0 items-center justify-center rounded-full leading-none text-current opacity-70 transition hover:opacity-100 focus-visible:opacity-100 focus-visible:ring-2 focus-visible:ring-current focus-visible:outline-none"
    (click)="onRemove($event)"
    aria-label="Remove"
  >
    <span
      dlcIcon="close"
      class="text-sm leading-none"
    ></span>
  </button>
}
