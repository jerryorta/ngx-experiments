@let frameStyle = frame();
@let imgSrc = src();
@let imgAlt = alt();
@let imgLoading = loading();
@let addressUrl = url();
@let eyebrowText = eyebrow();
@let captionText = caption();

<figure class="m-0 flex flex-col gap-4">
  @switch (frameStyle) {
    @case ("browser") {
      <div class="overflow-hidden rounded-[var(--dlc-radius-lg)] bg-(--dlc-surface-container)">
        <div class="flex items-center gap-3 bg-(--dlc-surface-container-high) px-4 py-3">
          <span
            class="flex shrink-0 gap-2"
            aria-hidden="true"
          >
            <span class="block h-3 w-3 rounded-full bg-(--dlc-on-surface-variant)/40"></span>
            <span class="block h-3 w-3 rounded-full bg-(--dlc-on-surface-variant)/40"></span>
            <span class="block h-3 w-3 rounded-full bg-(--dlc-on-surface-variant)/40"></span>
          </span>
          @if (addressUrl) {
            <span
              class="min-w-0 flex-1 truncate rounded-[var(--dlc-radius-sm)] bg-(--dlc-surface-container-low) px-3 py-1 text-center font-[family-name:var(--dlc-font-family-body)] text-xs text-(--dlc-on-surface-variant)"
            >
              {{ addressUrl }}
            </span>
          }
        </div>
        <img
          [src]="imgSrc"
          [alt]="imgAlt"
          [attr.loading]="imgLoading"
          class="block h-auto w-full"
        />
      </div>
    }
    @case ("device") {
      <div
        class="mx-auto overflow-hidden rounded-[var(--dlc-radius-lg)] bg-(--dlc-surface-container) px-3 pt-3 pb-4"
      >
        <span
          class="mx-auto mb-3 block h-1.5 w-16 rounded-[var(--dlc-radius-sm)] bg-(--dlc-on-surface-variant)/30"
          aria-hidden="true"
        ></span>
        <img
          [src]="imgSrc"
          [alt]="imgAlt"
          [attr.loading]="imgLoading"
          class="block h-auto w-full rounded-[var(--dlc-radius-md)]"
        />
        <span
          class="mx-auto mt-3 block h-1 w-24 rounded-[var(--dlc-radius-sm)] bg-(--dlc-on-surface-variant)/30"
          aria-hidden="true"
        ></span>
      </div>
    }
    @default {
      <img
        [src]="imgSrc"
        [alt]="imgAlt"
        [attr.loading]="imgLoading"
        class="block h-auto w-full rounded-[var(--dlc-radius-lg)] bg-(--dlc-surface-container)"
      />
    }
  }

  @if (eyebrowText || captionText) {
    <figcaption class="flex flex-col gap-1 text-center">
      @if (eyebrowText) {
        <span
          class="font-[family-name:var(--dlc-font-family-body)] text-xs font-semibold tracking-wide text-(--dlc-secondary) uppercase"
        >
          {{ eyebrowText }}
        </span>
      }
      @if (captionText) {
        <span
          class="font-[family-name:var(--dlc-font-family-body)] text-sm text-(--dlc-on-surface-variant)"
        >
          {{ captionText }}
        </span>
      }
    </figcaption>
  }
</figure>
