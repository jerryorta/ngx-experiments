<giga-storybook-review-container
  [reviewStatus]="reviewStatus"
  [storybookFilePath]="storybookFilePath"
  trackingNumber="REX-483"
>
  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    Interactive (controlled by Storybook args) — click the trigger to open
  </h4>
  <div class="mb-8">
    <dlc-filter-popover
      [active]="activeSig()"
      [clearable]="clearableSig()"
      [label]="labelSig()"
      [valueLabel]="valueLabelSig()"
    >
      <div class="dlc-fpop-demo">
        <label class="dlc-fpop-demo__row"
          ><input
            type="radio"
            name="demo-beds"
          />
          Any</label
        >
        <label class="dlc-fpop-demo__row"
          ><input
            type="radio"
            name="demo-beds"
          />
          1+</label
        >
        <label class="dlc-fpop-demo__row"
          ><input
            type="radio"
            name="demo-beds"
          />
          2+</label
        >
        <label class="dlc-fpop-demo__row"
          ><input
            type="radio"
            name="demo-beds"
          />
          3+</label
        >
      </div>
    </dlc-filter-popover>
  </div>

  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">States</h4>
  <div class="mb-8 flex flex-row flex-wrap items-center gap-3">
    <dlc-filter-popover label="Beds">
      <div class="dlc-fpop-demo">
        <span class="dlc-fpop-demo__note">Default (inactive)</span>
      </div>
    </dlc-filter-popover>
    <dlc-filter-popover
      label="Price"
      valueLabel="$300k–$800k"
      [active]="true"
    >
      <div class="dlc-fpop-demo">
        <span class="dlc-fpop-demo__note">Active with value label</span>
      </div>
    </dlc-filter-popover>
    <dlc-filter-popover
      label="Status"
      valueLabel="Active"
      [active]="true"
      [clearable]="true"
    >
      <div class="dlc-fpop-demo">
        <span class="dlc-fpop-demo__note">Clearable footer (Clear / Done)</span>
      </div>
    </dlc-filter-popover>
  </div>
</giga-storybook-review-container>
