<giga-storybook-review-container
  [reviewStatus]="reviewStatus"
  [storybookFilePath]="storybookFilePath"
  [uxUrl]="uxUrl"
  trackingNumber="REX-47"
>
  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">Interactive</h4>
  <div class="mb-8">
    <dlc-billing-toggle [value]="valueSig()" />
  </div>

  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">Monthly Active</h4>
  <div class="mb-6">
    <dlc-billing-toggle value="monthly" />
  </div>

  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60"
    >Annual Active (with discount)</h4
  >
  <div class="mb-6">
    <dlc-billing-toggle value="annual" />
  </div>
</giga-storybook-review-container>
