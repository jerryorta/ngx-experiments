<nge-storybook-review-container
  [reviewStatus]="reviewStatus"
  [storybookFilePath]="storybookFilePath"
  trackingNumber="REX-494"
>
  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    Default (no selection)
  </h4>
  <div class="mb-8 max-w-md">
    <dlc-ratings-filter />
  </div>

  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    Default with per-rating counts
  </h4>
  <div class="mb-8 max-w-md">
    <dlc-ratings-filter [counts]="interactiveCounts" />
  </div>

  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    Selected — high ratings only (5★, 4★)
  </h4>
  <div class="mb-8 max-w-md">
    <dlc-ratings-filter
      [selected]="[5, 4]"
      [counts]="interactiveCounts"
    />
  </div>

  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    Zero results for some buckets
  </h4>
  <div class="mb-8 max-w-md">
    <dlc-ratings-filter
      [selected]="[5]"
      [counts]="sparseCounts"
    />
  </div>

  <h4 class="mb-4 text-sm font-semibold tracking-wider uppercase opacity-60">
    Interactive (Live Emissions)
  </h4>
  <div class="mb-8 max-w-md">
    <dlc-ratings-filter
      [selected]="interactiveSelected()"
      [counts]="interactiveCounts"
      (selectedChange)="onInteractiveSelectedChange($event)"
    />
    <p class="mt-3 text-xs text-(--dlc-on-surface-variant)">
      Emitted selectedChange — [{{ interactiveSelected().join(", ") }}]
    </p>
  </div>
</nge-storybook-review-container>
