<div class="ldg-shell flex min-h-screen flex-col bg-(--dlc-surface) text-(--dlc-on-surface)">
  <header
    class="ldg-shell__bar flex flex-wrap items-center gap-x-6 gap-y-3 border-b border-(--dlc-outline-variant) bg-(--dlc-surface-container) px-4 py-3 md:px-6"
  >
    <a routerLink="/overview" class="flex items-center gap-2 text-lg font-semibold tracking-tight">
      <span [dlcIcon]="'account_balance'" class="text-(--dlc-primary)"></span>
      Ledger
    </a>

    <nav class="flex flex-wrap items-center gap-1" aria-label="Primary navigation">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="ldg-shell__link--active"
          class="ldg-shell__link flex items-center gap-1.5 rounded-lg px-3 py-1.5 text-sm font-medium"
        >
          <span [dlcIcon]="link.icon" class="text-[1.15rem]"></span>
          {{ link.label }}
        </a>
      }
    </nav>

    <div class="ml-auto">
      <ldg-theme-switcher
        [themes]="themeConfigs"
        [activeCssClass]="themeStore.activeCssClass()"
        (themeSelected)="themeStore.setTheme($event)"
      />
    </div>
  </header>

  <main class="ldg-shell__content flex-1">
    <router-outlet />
  </main>
</div>
