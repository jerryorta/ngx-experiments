<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Ledger</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <!-- Persona typefaces (Manrope/DM Sans · Literata/Nunito Sans · Epilogue/IBM
         Plex Sans) + Material Symbols for [dlcIcon]. The @nge/themes personas
         reference these families; without them icons render as ligature text
         and type falls back to system fonts. Mirrors
         apps/storybook-app/.storybook/preview.ts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400..700&family=Nunito+Sans:wght@400..700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400..700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
    />
  </head>
  <body class="dlc-professional-dark">
    <ldg-root></ldg-root>
  </body>
</html>
